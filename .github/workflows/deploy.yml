name: Deploy to Azure (Easy Find)

on:
  workflow_dispatch:

env:
  NODE_VERSION: '20.x'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  AZURE_WEBAPP_NAME: CampeaPhotoLab
  AZURE_RESOURCE_GROUP: PhotoLab
  CANONICAL_APP_URL: 'https://labs.campeaphotography.com'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build:appservice
        env:
          VITE_API_URL: /api
          VITE_USE_MOCK_API: false

      - name: Verify build artifacts
        run: |
          if [ ! -d dist ] || [ ! -d server ]; then
            echo "Missing build artifacts: dist or server folder not found."
            exit 1
          fi
          echo "Build artifacts verified."

      - name: Prepare deployment bundle
        run: |
          rm -rf deploy
          mkdir -p deploy
          cp -R server deploy/server
          cp -R dist deploy/dist
          cp package.json package-lock.json deploy/
          cd deploy
          npm ci --omit=dev

      - name: Create deployment zip
        run: |
          cd deploy
          zip -r ../appservice-deploy.zip \
            server \
            dist \
            node_modules \
            package.json \
            package-lock.json \
            -x "**/.DS_Store" "**/*.log" "**/test-results/**" "**/playwright-report/**" "server/uploads/**" "server/*.db" "server/*.db.*"
          cd ..
          ls -lh appservice-deploy.zip

      - name: Azure CLI Login
        env:
          AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
        run: |
          if [ -z "$AZURE_CREDENTIALS" ]; then
            echo "Missing required secret: AZURE_CREDENTIALS"
            exit 1
          fi

          if ! command -v az >/dev/null 2>&1; then
            echo "Azure CLI not found on runner"
            exit 1
          fi

          CLIENT_ID=$(node -e "const c=JSON.parse(process.env.AZURE_CREDENTIALS||'{}'); process.stdout.write(c.clientId||'')")
          CLIENT_SECRET=$(node -e "const c=JSON.parse(process.env.AZURE_CREDENTIALS||'{}'); process.stdout.write(c.clientSecret||'')")
          TENANT_ID=$(node -e "const c=JSON.parse(process.env.AZURE_CREDENTIALS||'{}'); process.stdout.write(c.tenantId||'')")
          SUBSCRIPTION_ID=$(node -e "const c=JSON.parse(process.env.AZURE_CREDENTIALS||'{}'); process.stdout.write(c.subscriptionId||'')")

          if [ -z "$CLIENT_ID" ] || [ -z "$CLIENT_SECRET" ] || [ -z "$TENANT_ID" ]; then
            echo "AZURE_CREDENTIALS is missing clientId, clientSecret, or tenantId"
            exit 1
          fi

          az login --service-principal \
            --username "$CLIENT_ID" \
            --password "$CLIENT_SECRET" \
            --tenant "$TENANT_ID" \
            --output none

          if [ -n "$SUBSCRIPTION_ID" ]; then
            az account set --subscription "$SUBSCRIPTION_ID"
          fi

      - name: Configure App Service runtime
        env:
          ALL_SECRETS: ${{ toJson(secrets) }}
          JWT_SECRET: ${{ secrets['JWT_SECRET'] }}
          DB_HOST: ${{ secrets['DB_HOST'] }}
          DB_PORT: ${{ secrets['DB_PORT'] }}
          DB_NAME: ${{ secrets['DB_NAME'] }}
          DB_USER: ${{ secrets['DB_USER'] }}
          DB_PASSWORD: ${{ secrets['DB_PASSWORD'] }}
          AZURE_STORAGE_CONNECTION_STRING: ${{ secrets['AZURE_STORAGE_CONNECTION_STRING'] }}
          AZURE_STORAGE_CONTAINER: ${{ secrets['AZURE_STORAGE_CONTAINER'] }}
        run: |
          export MSSQL_CONNECTION_STRING=$(node -e "const s=JSON.parse(process.env.ALL_SECRETS||'{}'); process.stdout.write(s.MSSQL_CONNECTION_STRING||'')")
          export MSSQL_ENCRYPT=$(node -e "const s=JSON.parse(process.env.ALL_SECRETS||'{}'); process.stdout.write(s.MSSQL_ENCRYPT||'')")
          export MSSQL_TRUST_CERT=$(node -e "const s=JSON.parse(process.env.ALL_SECRETS||'{}'); process.stdout.write(s.MSSQL_TRUST_CERT||'')")
          export STRIPE_SECRET_KEY=$(node -e "const s=JSON.parse(process.env.ALL_SECRETS||'{}'); process.stdout.write(s.STRIPE_SECRET_KEY||'')")
          export STRIPE_WEBHOOK_SECRET=$(node -e "const s=JSON.parse(process.env.ALL_SECRETS||'{}'); process.stdout.write(s.STRIPE_WEBHOOK_SECRET||'')")
          export MPIX_API_KEY=$(node -e "const s=JSON.parse(process.env.ALL_SECRETS||'{}'); process.stdout.write(s.MPIX_API_KEY||'')")
          export MPIX_API_SECRET=$(node -e "const s=JSON.parse(process.env.ALL_SECRETS||'{}'); process.stdout.write(s.MPIX_API_SECRET||'')")

          if [ -z "$JWT_SECRET" ]; then
            echo "Missing required secret: JWT_SECRET"
            exit 1
          fi

          APP_HOST=$(az webapp show \
            --name ${{ env.AZURE_WEBAPP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query defaultHostName -o tsv)

          APP_URL="${{ env.CANONICAL_APP_URL }}"
          if [ -z "$APP_URL" ]; then
            APP_URL="https://${APP_HOST}"
          fi
          SETTINGS=(
            "SCM_DO_BUILD_DURING_DEPLOYMENT=false"
            "ENABLE_ORYX_BUILD=false"
            "NODE_ENV=production"
            "WEBSITE_NODE_DEFAULT_VERSION=~20"
            "NODE_OPTIONS=--no-deprecation"
            "PORT=8080"
            "JWT_SECRET=$JWT_SECRET"
            "FRONTEND_URL=$APP_URL"
          )

          HAS_VALID_CONN_STRING=0
          if [ -n "$MSSQL_CONNECTION_STRING" ] && echo "$MSSQL_CONNECTION_STRING" | grep -Eiq '(^|;)[[:space:]]*(server|data source)[[:space:]]*='; then
            HAS_VALID_CONN_STRING=1
            SETTINGS+=("MSSQL_CONNECTION_STRING=$MSSQL_CONNECTION_STRING")
          elif [ -n "$MSSQL_CONNECTION_STRING" ]; then
            echo "Warning: MSSQL_CONNECTION_STRING appears invalid; ignoring it and using DB_* secrets"
          fi

          if [ -n "$DB_HOST" ] && [ -n "$DB_NAME" ] && [ -n "$DB_USER" ] && [ -n "$DB_PASSWORD" ]; then
            SETTINGS+=("DB_HOST=$DB_HOST")
            SETTINGS+=("DB_PORT=${DB_PORT:-1433}")
            SETTINGS+=("DB_NAME=$DB_NAME")
            SETTINGS+=("DB_USER=$DB_USER")
            SETTINGS+=("DB_PASSWORD=$DB_PASSWORD")
          elif [ "$HAS_VALID_CONN_STRING" -ne 1 ]; then
            echo "Missing DB secrets. Provide valid MSSQL_CONNECTION_STRING or DB_HOST/DB_NAME/DB_USER/DB_PASSWORD"
            exit 1
          fi

          SETTINGS+=("MSSQL_ENCRYPT=${MSSQL_ENCRYPT:-true}")
          SETTINGS+=("MSSQL_TRUST_CERT=${MSSQL_TRUST_CERT:-false}")

          if [ -n "$STRIPE_SECRET_KEY" ]; then
            SETTINGS+=("STRIPE_SECRET_KEY=$STRIPE_SECRET_KEY")
          fi

          if [ -n "$STRIPE_WEBHOOK_SECRET" ]; then
            SETTINGS+=("STRIPE_WEBHOOK_SECRET=$STRIPE_WEBHOOK_SECRET")
          fi

          if [ -n "$MPIX_API_KEY" ]; then
            SETTINGS+=("MPIX_API_KEY=$MPIX_API_KEY")
          fi

          if [ -n "$MPIX_API_SECRET" ]; then
            SETTINGS+=("MPIX_API_SECRET=$MPIX_API_SECRET")
          fi

          if [ -n "$AZURE_STORAGE_CONNECTION_STRING" ]; then
            SETTINGS+=("AZURE_STORAGE_CONNECTION_STRING=$AZURE_STORAGE_CONNECTION_STRING")
          fi

          SETTINGS+=("AZURE_STORAGE_CONTAINER=${AZURE_STORAGE_CONTAINER:-photos}")

          az webapp config appsettings set \
            --name ${{ env.AZURE_WEBAPP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --settings "${SETTINGS[@]}"

          az webapp config set \
            --name ${{ env.AZURE_WEBAPP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --startup-file "node server/server.js"

      - name: Deploy to Azure Web App (zip deploy with retry)
        run: |
          APP_HOST=$(az webapp show \
            --name ${{ env.AZURE_WEBAPP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query defaultHostName -o tsv)
          KUDU_HOST="${APP_HOST/./.scm.}"

          CREDS=$(az webapp deployment list-publishing-credentials \
            --name ${{ env.AZURE_WEBAPP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            -o json)

          USERNAME=$(echo "$CREDS" | python3 -c "import json,sys; print(json.load(sys.stdin).get('publishingUserName',''))")
          PASSWORD=$(echo "$CREDS" | python3 -c "import json,sys; print(json.load(sys.stdin).get('publishingPassword',''))")

          wait_for_idle_deployment() {
            for check in $(seq 1 60); do
              LATEST=$(curl -sS -u "$USERNAME:$PASSWORD" "https://${KUDU_HOST}/api/deployments/latest" || true)
              STATUS=$(echo "$LATEST" | python3 -c "import json,sys; raw=sys.stdin.read().strip(); print((json.loads(raw).get('status',-1) if raw else -1))" 2>/dev/null || echo -1)

              if [ "$STATUS" = "0" ] || [ "$STATUS" = "1" ] || [ "$STATUS" = "2" ]; then
                echo "Another deployment is still running (status=${STATUS}). Waiting 20s..."
                sleep 20
                continue
              fi

              return 0
            done

            echo "Timed out waiting for previous deployment to finish"
            return 1
          }

          wait_for_deployment_completion() {
            for check in $(seq 1 90); do
              LATEST=$(curl -sS -u "$USERNAME:$PASSWORD" "https://${KUDU_HOST}/api/deployments/latest" || true)
              STATUS=$(echo "$LATEST" | python3 -c "import json,sys; raw=sys.stdin.read().strip(); print((json.loads(raw).get('status',-1) if raw else -1))" 2>/dev/null || echo -1)

              if [ "$STATUS" = "4" ]; then
                echo "Deployment completed successfully (status=4)."
                return 0
              fi

              if [ "$STATUS" = "3" ]; then
                echo "Deployment failed (status=3)."
                echo "$LATEST" | cat
                return 1
              fi

              echo "Deployment in progress (status=${STATUS}). Waiting 20s..."
              sleep 20
            done

            echo "Timed out waiting for deployment completion. Continuing to health checks."
            return 0
          }

          for attempt in 1 2 3; do
            echo "Deploy attempt ${attempt}/3"
            wait_for_idle_deployment

            if az webapp deploy \
              --name ${{ env.AZURE_WEBAPP_NAME }} \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --src-path appservice-deploy.zip \
              --type zip \
              --async true; then
              echo "Deployment started asynchronously. Monitoring Kudu status..."
              if wait_for_deployment_completion; then
                break
              fi
            fi

            if [ "$attempt" -eq 3 ]; then
              echo "Deployment failed after 3 attempts"
              exit 1
            fi

            echo "Deployment failed. Waiting before retry..."
            sleep 60
          done

      - name: Fetch latest Kudu deployment diagnostics on failure
        if: failure()
        run: |
          APP_HOST=$(az webapp show \
            --name ${{ env.AZURE_WEBAPP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query defaultHostName -o tsv)
          KUDU_HOST="${APP_HOST/./.scm.}"

          CREDS=$(az webapp deployment list-publishing-credentials \
            --name ${{ env.AZURE_WEBAPP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            -o json)

          USERNAME=$(echo "$CREDS" | python3 -c "import json,sys; print(json.load(sys.stdin).get('publishingUserName',''))")
          PASSWORD=$(echo "$CREDS" | python3 -c "import json,sys; print(json.load(sys.stdin).get('publishingPassword',''))")

          echo "Latest deployment summary:"
          curl -sS -u "$USERNAME:$PASSWORD" "https://${KUDU_HOST}/api/deployments/latest" | cat

      - name: Upload deployment logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: deployment-logs
          path: appservice-deploy.zip

      - name: Verify health endpoint
        run: |
          sleep 20
          APP_HOST=$(az webapp show \
            --name ${{ env.AZURE_WEBAPP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query defaultHostName -o tsv)

          DEFAULT_HEALTH="https://${APP_HOST}/api/health"
          CANONICAL_HEALTH="${{ env.CANONICAL_APP_URL }}/api/health"

          check_health() {
            local url="$1"
            for attempt in $(seq 1 18); do
              echo "Health check ${attempt}/18: ${url}"
              if curl -fsS --max-time 10 "$url" > /dev/null; then
                echo "Health check passed: ${url}"
                return 0
              fi
              sleep 10
            done
            return 1
          }

            if check_health "$DEFAULT_HEALTH" || check_health "$CANONICAL_HEALTH"; then
              echo "Health check succeeded."
            else
              echo "Error: Health endpoint did not become ready in time. Failing workflow."
              exit 1
            fi
