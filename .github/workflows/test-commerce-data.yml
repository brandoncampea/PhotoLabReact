name: Test Commerce Data

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Action to run"
        required: true
        type: choice
        default: seed
        options:
          - seed
          - clear
          - clear-dry-run

env:
  NODE_VERSION: '20.x'

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Preflight Stripe seed config
        if: ${{ github.event.inputs.action == 'seed' }}
        env:
          STRIPE_TEST_SECRET_KEY: ${{ secrets.STRIPE_TEST_SECRET_KEY }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
        run: |
          classify() {
            case "$1" in
              sk_test_*) echo test ;;
              sk_live_*) echo live ;;
              '') echo missing ;;
              *example*|*** ) echo placeholder ;;
              *) echo unknown ;;
            esac
          }

          TEST_KIND=$(classify "$STRIPE_TEST_SECRET_KEY")
          DEFAULT_KIND=$(classify "$STRIPE_SECRET_KEY")

          echo "STRIPE_TEST_SECRET_KEY=${TEST_KIND}"
          echo "STRIPE_SECRET_KEY=${DEFAULT_KIND}"

          if [ "$TEST_KIND" != "test" ] && [ "$DEFAULT_KIND" != "test" ]; then
            echo "Missing valid Stripe test key. Add GitHub secret STRIPE_TEST_SECRET_KEY with an sk_test_ value."
            exit 1
          fi

      - name: Run selected action
        env:
          MSSQL_CONNECTION_STRING: ${{ secrets.MSSQL_CONNECTION_STRING }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          MSSQL_ENCRYPT: ${{ secrets.MSSQL_ENCRYPT }}
          MSSQL_TRUST_CERT: ${{ secrets.MSSQL_TRUST_CERT }}
          STRIPE_TEST_SECRET_KEY: ${{ secrets.STRIPE_TEST_SECRET_KEY }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          case "${{ github.event.inputs.action }}" in
            seed)
              npm run seed:test-commerce
              ;;
            clear)
              npm run clear:test-commerce
              ;;
            clear-dry-run)
              npm run clear:test-commerce:dry-run
              ;;
            *)
              echo "Unsupported action"
              exit 1
              ;;
          esac
